# CERNBox sender stack (one-party: web + idp + Reva microservices).
# All dynamic values filled by docker compose env substitution from stack.env.
# Internal Reva hostnames are hardcoded compose service names (stable DNS).
# OCM shares store: named volume at /var/tmp/reva on gateway, shareproviders,
# and dataprovider-ocm (REVAD_OCMSHARES_JSON_FILE).
# `sender` depends_on lists every Reva microservice the gateway needs at
# runtime (authproviders, shareproviders, groupuserproviders). Two-party runs
# start only `sender`/`receiver`/`mitm` plus their transitive depends_on
# closure, so anything missing here never starts and the gateway's bearer
# auth silently fails with a DNS lookup error for the missing peer.
services:
  sender:
    image: ${SENDER_IMAGE}
    hostname: sender
    cap_add:
      - NET_BIND_SERVICE
    networks:
      ocm-net:
        aliases:
          - ${SENDER_PARTY_HOST}
    depends_on:
      sender-idp:
        condition: service_healthy
      sender-revad-gateway:
        condition: service_healthy
      sender-revad-dataprovider-localhome:
        condition: service_healthy
      sender-revad-dataprovider-ocm:
        condition: service_healthy
      sender-revad-dataprovider-sciencemesh:
        condition: service_healthy
      sender-revad-authprovider-oidc:
        condition: service_healthy
      sender-revad-authprovider-machine:
        condition: service_healthy
      sender-revad-authprovider-ocmshares:
        condition: service_healthy
      sender-revad-authprovider-ocmsharecode:
        condition: service_healthy
      sender-revad-authprovider-ocmexchangedtoken:
        condition: service_healthy
      sender-revad-authprovider-publicshares:
        condition: service_healthy
      sender-revad-shareproviders:
        condition: service_healthy
      sender-revad-groupuserproviders:
        condition: service_healthy
    environment:
      - CERNBOX_WEB_HOSTNAME=${SENDER_PARTY_HOST}
      - REVAD_TLS_ENABLED=false
      - REVAD_PROTOCOL=http
      - REVAD_PORT=80
      - REVAD_GATEWAY_HOST=sender-revad-gateway
      - REVAD_GATEWAY_PORT=80
      - IDP_URL=${SENDER_IDP_ORIGIN}
      - WEB_DOMAIN=${SENDER_PARTY_HOST}
      - WEB_PROTOCOL=https
      - WEB_TLS_ENABLED=true
      - TLS_CRT=/tls/cernbox.crt
      - TLS_KEY=/tls/cernbox.key
      - HTTP_PROXY=${SENDER_HTTP_PROXY}
      - HTTPS_PROXY=${SENDER_HTTPS_PROXY}
      - NO_PROXY=${SENDER_NO_PROXY}
  sender-idp:
    image: ${SENDER_IDP_IMAGE}
    cap_add:
      - NET_BIND_SERVICE
    networks:
      ocm-net:
        aliases:
          - ${SENDER_IDP_HOST}
    environment:
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=admin
      - KC_PROXY_HEADERS=xforwarded
      - KC_HOSTNAME=${SENDER_IDP_ORIGIN}
      - KC_HOSTNAME_ADMIN=${SENDER_IDP_ORIGIN}
      - KC_HTTP_ENABLED=true
      - KC_HTTPS_PORT=443
      - KC_HTTPS_CERTIFICATE_FILE=/tls/idp.crt
      - KC_HTTPS_CERTIFICATE_KEY_FILE=/tls/idp.key
      - KC_HEALTH_ENABLED=true
      - KC_HTTP_MANAGEMENT_SCHEME=http
      - IDP_DOMAIN=${SENDER_IDP_HOST}
      - IDP_URL=${SENDER_IDP_ORIGIN}
  sender-revad-gateway:
    image: ${SENDER_REVAD_IMAGE}
    networks: [ocm-net]
    depends_on:
      sender-idp:
        condition: service_healthy
    environment:
      - REVAD_CONTAINER_MODE=gateway
      - DOMAIN=${SENDER_PARTY_HOST}
      - REVAD_TLS_ENABLED=false
      - REVAD_PROTOCOL=http
      - REVAD_PORT=80
      - REVAD_GATEWAY_HOST=sender-revad-gateway
      - REVAD_GATEWAY_PORT=80
      - REVAD_GATEWAY_PROTOCOL=http
      - REVAD_GATEWAY_GRPC_PORT=9142
      - REVAD_LOG_LEVEL=debug
      - REVAD_LOG_OUTPUT=/var/log/revad.log
      - REVAD_JWT_SECRET=reva-secret
      - REVAD_OCMSHARES_JSON_FILE=/var/tmp/reva/shares.json
      - WEB_DOMAIN=${SENDER_PARTY_HOST}
      - WEB_PROTOCOL=https
      - IDP_DOMAIN=${SENDER_IDP_HOST}
      - IDP_URL=${SENDER_IDP_ORIGIN}
      - REVAD_CONFIG_DIR=/etc/revad
      - REVAD_DATAPROVIDER_LOCALHOME_HOST=sender-revad-dataprovider-localhome
      - REVAD_DATAPROVIDER_LOCALHOME_GRPC_PORT=9143
      - REVAD_DATAPROVIDER_OCM_HOST=sender-revad-dataprovider-ocm
      - REVAD_DATAPROVIDER_OCM_GRPC_PORT=9146
      - REVAD_DATAPROVIDER_SCIENCEMESH_HOST=sender-revad-dataprovider-sciencemesh
      - REVAD_DATAPROVIDER_SCIENCEMESH_GRPC_PORT=9147
      - REVAD_AUTHPROVIDER_OIDC_HOST=sender-revad-authprovider-oidc
      - REVAD_AUTHPROVIDER_OIDC_GRPC_PORT=9158
      - REVAD_AUTHPROVIDER_MACHINE_HOST=sender-revad-authprovider-machine
      - REVAD_AUTHPROVIDER_MACHINE_GRPC_PORT=9166
      - REVAD_AUTHPROVIDER_OCMSHARES_HOST=sender-revad-authprovider-ocmshares
      - REVAD_AUTHPROVIDER_OCMSHARES_GRPC_PORT=9278
      - REVAD_AUTHPROVIDER_OCMSHARECODE_HOST=sender-revad-authprovider-ocmsharecode
      - REVAD_AUTHPROVIDER_OCMSHARECODE_GRPC_PORT=9280
      - REVAD_AUTHPROVIDER_OCMEXCHANGEDTOKEN_HOST=sender-revad-authprovider-ocmexchangedtoken
      - REVAD_AUTHPROVIDER_OCMEXCHANGEDTOKEN_GRPC_PORT=9282
      - REVAD_AUTHPROVIDER_PUBLICSHARES_HOST=sender-revad-authprovider-publicshares
      - REVAD_AUTHPROVIDER_PUBLICSHARES_GRPC_PORT=9160
      - OCM_ENABLE_CODE_FLOW=true
      - OCM_TIMEOUT=10
      - REVAD_SHAREPROVIDERS_HOST=sender-revad-shareproviders
      - REVAD_SHAREPROVIDERS_GRPC_PORT=9144
      - REVAD_GROUPUSERPROVIDERS_HOST=sender-revad-groupuserproviders
      - REVAD_GROUPUSERPROVIDERS_GRPC_PORT=9145
      - OCM_PROVIDER_0_NAME=${OCM_PROVIDER_0_NAME}
      - OCM_PROVIDER_0_FULL_NAME=${OCM_PROVIDER_0_FULL_NAME}
      - OCM_PROVIDER_0_ORGANIZATION=${OCM_PROVIDER_0_ORGANIZATION}
      - OCM_PROVIDER_0_DESCRIPTION=${OCM_PROVIDER_0_DESCRIPTION}
      - OCM_PROVIDER_0_DOMAIN=${OCM_PROVIDER_0_DOMAIN}
      - OCM_PROVIDER_0_HOMEPAGE=${OCM_PROVIDER_0_HOMEPAGE}
      - OCM_PROVIDER_0_OCM_ENDPOINT=${OCM_PROVIDER_0_OCM_ENDPOINT}
      - OCM_PROVIDER_0_OCM_PATH=${OCM_PROVIDER_0_OCM_PATH}
      - OCM_PROVIDER_0_OCM_HOST=${OCM_PROVIDER_0_OCM_HOST}
      - OCM_PROVIDER_0_WEBDAV_ENDPOINT=${OCM_PROVIDER_0_WEBDAV_ENDPOINT}
      - OCM_PROVIDER_0_WEBDAV_PATH=${OCM_PROVIDER_0_WEBDAV_PATH}
      - OCM_PROVIDER_0_WEBDAV_HOST=${OCM_PROVIDER_0_WEBDAV_HOST}
    volumes:
      - sender-reva-ocmshares:/var/tmp/reva
