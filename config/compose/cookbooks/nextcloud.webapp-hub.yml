# Nextcloud webapp-share sender-side JupyterHub (real hub service, not an alias on sender).
# All dynamic values filled by docker compose env substitution from stack.env.
services:
  sender-hub:
    image: ${SENDER_HUB_IMAGE}
    hostname: sender-hub
    cap_add:
      - NET_BIND_SERVICE
    networks:
      ocm-net:
        aliases:
          - ${SENDER_HUB_HOST}
    depends_on:
      sender:
        condition: service_healthy
    healthcheck:
      # k8s-hub has no curl; python3 is always present. Probe the hub health
      # endpoint over the in-container TLS listener (self-signed at boot).
      test:
        - CMD
        - python3
        - -c
        - "import ssl,urllib.request; urllib.request.urlopen('https://127.0.0.1/hub/health', context=ssl._create_unverified_context(), timeout=5)"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    environment:
      - NEXTCLOUD_HOST=${SENDER_PARTY_HOST}
      - JUPYTER_HOST=${SENDER_HUB_HOST}
      - JUPYTERHUB_CRYPT_KEY=${SENDER_HUB_CRYPT_KEY}
      - JUPYTERHUB_API_KEY=${SENDER_HUB_API_KEY}
      - JUPYTERHUB_OCM_API_KEY=${SENDER_HUB_OCM_API_KEY}
      - OCM_TRUSTED_BACK_CHANNEL_DOMAINS=${SENDER_PARTY_HOST}
      - OCM_TRUSTED_ISSUER_DOMAINS=${SENDER_PARTY_HOST}
      # OAuth client id/secret are provisioned by the sender NC post-install hook
      # and handed off via this shared file; entrypoint-init.nu waits for it.
      - NEXTCLOUD_OAUTH_ENV_FILE=/oauth-handoff/oauth.env
    volumes:
      - ${OCMTS_ARTIFACTS_BASE}/oauth-handoff:/oauth-handoff:ro
