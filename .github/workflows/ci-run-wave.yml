# Generated by: nu scripts/ocmts.nu ci workflows generate github
# Do NOT edit by hand - regenerate with the command above.
# Reusable workflow: runs all cells for one flow as a matrix,
# calling ci-run-cell.yml for each cell.
#
# Two-job design:
#   load-cells  - checks out repo, reads cells-path asset, emits cells-json output
#   run-wave    - matrix over cells-json; calls ci-run-cell.yml for each cell

name: Run OCM Flow Wave

on:
  workflow_call:
    inputs:
      flow-id:
        required: true
        type: string
      suite-id:
        required: true
        type: string
      cells-path:
        required: true
        type: string

jobs:
  load-cells:
    runs-on: ubuntu-latest
    outputs:
      cells-json: ${{ steps.read.outputs['cells-json'] }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Read and validate cells JSON
        id: read
        run: |
          CELLS=$(nu scripts/ocmts.nu ci read-cells-json "${{ inputs['cells-path'] }}")
          echo "cells-json=$CELLS" >> $GITHUB_OUTPUT

  run-wave:
    needs: [load-cells]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs['load-cells'].outputs['cells-json']) }}
    name: test ${{ matrix.wave_index }}
    uses: ./.github/workflows/ci-run-cell.yml
    with:
      display-name: ${{ matrix.display_name }}
      scenario: ${{ matrix.scenario }}
      sender-platform: ${{ matrix.sender_platform }}
      sender-version: ${{ matrix.sender_version }}
      receiver-platform: ${{ matrix.receiver_platform }}
      receiver-version: ${{ matrix.receiver_version }}
      suite-id: ${{ inputs['suite-id'] }}
      artifact-name: ${{ matrix.artifact_name }}
      cell-id: ${{ matrix.cell_id }}
      cell-depends-on: ${{ matrix.cell_depends_on }}
