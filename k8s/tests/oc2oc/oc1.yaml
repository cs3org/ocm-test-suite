_: &sharedSecret shared-secret-oc1
__: &owncloudConf
  endpoint: http://owncloud:8080/index.php/apps/sciencemesh/
  shared_secret: *sharedSecret

gateway:
  revad:
    ingress:
      services:
        http:
          hostname: http.gateway1.localdev.me
        grpc:
          hostname: grpc.gateway1.localdev.me
    config:
      shared:
        jwt_secret: ocm-test-oc1-123
      http:
        services:
          dataprovider:
            drivers:
              nextcloud: *owncloudConf
      grpc:
        services:
          authprovider:
            auth_managers:
              nextcloud: *owncloudConf
          ocmcore:
            drivers:
              nextcloud: *owncloudConf
          ocmshareprovider:
            drivers:
              nextcloud: *owncloudConf
          storageprovider:
            drivers:
              nextcloud: *owncloudConf
          userprovider:
            drivers:
              nextcloud: *owncloudConf

owncloud:
  owncloud:
    configExtra:
      sciencemesh:
        iopUrl: http://owncloud-revad.oc-site1.svc.cluster.local:19001/
        revaSharedSecret: *sharedSecret
    domain: owncloud1.localdev.me
    trustedDomains:
      - owncloud1.localdev.me
      - owncloud
