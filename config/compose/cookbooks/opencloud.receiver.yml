# OpenCloud receiver service (two-party right party). Listens on 443 with TLS.
# All dynamic values filled by docker compose env substitution from stack.env.
services:
  receiver:
    image: ${RECEIVER_IMAGE}
    hostname: receiver
    cap_add:
      - NET_BIND_SERVICE
    networks:
      ocm-net:
        aliases:
          - ${RECEIVER_PARTY_HOST}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -skf https://127.0.0.1/ >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 36
      start_period: 90s
    environment:
      - OC_URL=https://${RECEIVER_PARTY_HOST}
      - OC_INSECURE=true
      - OC_LOG_LEVEL=debug
      - OPENCLOUD_INIT=true
      - OPENCLOUD_ADMIN_PASSWORD=admin
      - IDM_CREATE_DEMO_USERS=true
      - OC_ADD_RUN_SERVICES=ocm
      - PROXY_HTTP_ADDR=0.0.0.0:443
      - PROXY_ENABLE_BASIC_AUTH=true
      - NATS_NATS_HOST=0.0.0.0
      - NATS_NATS_PORT=9233
      - MICRO_REGISTRY_ADDRESS=127.0.0.1:9233
      - GATEWAY_GRPC_ADDR=0.0.0.0:9142
      - WEB_UI_CONFIG_FILE=/etc/opencloud/web-ui-config.json
      - FRONTEND_OCS_INCLUDE_OCM_SHAREES=true
      - FRONTEND_OCS_LIST_OCM_SHARES=true
      - FRONTEND_ENABLE_FEDERATED_SHARING_INCOMING=true
      - FRONTEND_ENABLE_FEDERATED_SHARING_OUTGOING=true
      - GRAPH_INCLUDE_OCM_SHAREES=true
      - OCM_OCM_INVITE_MANAGER_INSECURE=true
      - OCM_OCM_SHARE_PROVIDER_INSECURE=true
      - OCM_OCM_STORAGE_PROVIDER_INSECURE=true
      - OCM_PROVIDER_0_NAME=${OCM_PROVIDER_0_NAME}
      - OCM_PROVIDER_0_FULL_NAME=${OCM_PROVIDER_0_FULL_NAME}
      - OCM_PROVIDER_0_ORGANIZATION=${OCM_PROVIDER_0_ORGANIZATION}
      - OCM_PROVIDER_0_DESCRIPTION=${OCM_PROVIDER_0_DESCRIPTION}
      - OCM_PROVIDER_0_DOMAIN=${OCM_PROVIDER_0_DOMAIN}
      - OCM_PROVIDER_0_HOMEPAGE=${OCM_PROVIDER_0_HOMEPAGE}
      - OCM_PROVIDER_0_OCM_ENDPOINT=${OCM_PROVIDER_0_OCM_ENDPOINT}
      - OCM_PROVIDER_0_OCM_PATH=${OCM_PROVIDER_0_OCM_PATH}
      - OCM_PROVIDER_0_OCM_HOST=${OCM_PROVIDER_0_OCM_HOST}
      - OCM_PROVIDER_0_WEBDAV_ENDPOINT=${OCM_PROVIDER_0_WEBDAV_ENDPOINT}
      - OCM_PROVIDER_0_WEBDAV_PATH=${OCM_PROVIDER_0_WEBDAV_PATH}
      - OCM_PROVIDER_0_WEBDAV_HOST=${OCM_PROVIDER_0_WEBDAV_HOST}
      - OCM_PROVIDER_1_NAME=${OCM_PROVIDER_1_NAME}
      - OCM_PROVIDER_1_FULL_NAME=${OCM_PROVIDER_1_FULL_NAME}
      - OCM_PROVIDER_1_ORGANIZATION=${OCM_PROVIDER_1_ORGANIZATION}
      - OCM_PROVIDER_1_DESCRIPTION=${OCM_PROVIDER_1_DESCRIPTION}
      - OCM_PROVIDER_1_DOMAIN=${OCM_PROVIDER_1_DOMAIN}
      - OCM_PROVIDER_1_HOMEPAGE=${OCM_PROVIDER_1_HOMEPAGE}
      - OCM_PROVIDER_1_OCM_ENDPOINT=${OCM_PROVIDER_1_OCM_ENDPOINT}
      - OCM_PROVIDER_1_OCM_PATH=${OCM_PROVIDER_1_OCM_PATH}
      - OCM_PROVIDER_1_OCM_HOST=${OCM_PROVIDER_1_OCM_HOST}
      - OCM_PROVIDER_1_WEBDAV_ENDPOINT=${OCM_PROVIDER_1_WEBDAV_ENDPOINT}
      - OCM_PROVIDER_1_WEBDAV_PATH=${OCM_PROVIDER_1_WEBDAV_PATH}
      - OCM_PROVIDER_1_WEBDAV_HOST=${OCM_PROVIDER_1_WEBDAV_HOST}
      - HTTP_PROXY=${RECEIVER_HTTP_PROXY}
      - HTTPS_PROXY=${RECEIVER_HTTPS_PROXY}
      - NO_PROXY=${RECEIVER_NO_PROXY}
