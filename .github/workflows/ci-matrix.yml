# Generated by: nu scripts/ocmts.nu ci workflows generate github
# Do NOT edit by hand - regenerate with the command above.

name: OCM Test Suite CI

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:
    inputs:
      suite-id:
        description: 'Override suite_id for this run'
        required: false
        default: ''

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Workflow drift check
        env:
          OCMTS_ROOT: ${{ github.workspace }}
        run: nu scripts/ocmts.nu ci workflows check github
      - name: Cypress matrix drift check
        env:
          OCMTS_ROOT: ${{ github.workspace }}
        run: nu scripts/ocmts.nu matrix gen cypress --check
      - name: Adapter capabilities drift check
        env:
          OCMTS_ROOT: ${{ github.workspace }}
        run: nu scripts/ocmts.nu matrix check capabilities

  setup:
    needs: [preflight]
    runs-on: ubuntu-latest
    outputs:
      suite-id: ${{ steps.gen.outputs['suite-id'] }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Generate suite ID
        id: gen
        run: |
          if [ -n "${{ inputs['suite-id'] }}" ]; then
            SUITE_ID=$(nu scripts/ocmts.nu ci suite-id --override "${{ inputs['suite-id'] }}")
          else
            SUITE_ID=$(nu scripts/ocmts.nu ci suite-id)
          fi
          echo "suite-id=$SUITE_ID" >> $GITHUB_OUTPUT


  login:
    needs: [setup]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: login
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/login.json

  share-with:
    needs: [setup, login]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: share-with
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/share-with.json

  contact-token:
    needs: [setup, login, share-with]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: contact-token
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/contact-token.json

  contact-wayf:
    needs: [setup, login, share-with, contact-token]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: contact-wayf
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/contact-wayf.json

  webapp-share:
    needs: [setup, login, share-with, contact-token, contact-wayf]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: webapp-share
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/webapp-share.json

  aggregate:
    needs:
      [
        setup,
        login,
        share-with,
        contact-token,
        contact-wayf,
        webapp-share,
      ]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Download all cell artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/
          pattern: 'cell-*'
          merge-multiple: true
      - name: Aggregate suite manifest
        run: |
          EXPECTED=$(nu scripts/ocmts.nu ci plan --cell-ids)
          nu scripts/ocmts.nu ci plan --capability-skipped-json artifacts/capability-skipped-cells.json
          nu scripts/ocmts.nu ci find-suite-dirs artifacts > artifacts/suite-dirs.txt
          nu scripts/ocmts.nu ci aggregate \
            --suite-id "${{ needs.setup.outputs['suite-id'] }}" \
            --output-dir artifacts/suites/aggregated \
            --expected-cells "$EXPECTED" \
            --capability-skipped-cells artifacts/capability-skipped-cells.json \
            --dirs-file artifacts/suite-dirs.txt \
            --archive
      - name: Upload aggregate outputs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: aggregate-summary
          path: artifacts/suites/aggregated/
          if-no-files-found: warn

  ci-site:
    needs: [aggregate]
    if: always() && !cancelled() && github.ref == 'refs/heads/main' && needs.aggregate.result == 'success'
    uses: ./.github/workflows/ci-site.yml
    with:
      source-run-id: ${{ github.run_id }}
