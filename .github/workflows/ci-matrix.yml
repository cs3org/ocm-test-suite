# Generated by: nu scripts/ocmts.nu ci workflows generate github
# Do NOT edit by hand - regenerate with the command above.

name: OCM Test Suite CI

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      suite-id:
        description: 'Override suite_id for this run'
        required: false
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      suite-id: ${{ steps.gen.outputs['suite-id'] }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Generate suite ID
        id: gen
        run: |
          SUITE_ID="${{ inputs['suite-id'] }}"
          if [ -z "$SUITE_ID" ]; then
            SUITE_ID=$(nu -c "use scripts/lib/suite-index.nu [new-suite-id]; new-suite-id | print")
          fi
          echo "suite-id=$SUITE_ID" >> $GITHUB_OUTPUT


  login:
    needs: [setup]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: login
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/login.json

  share-with:
    needs: [setup, login]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: share-with
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/share-with.json

  contact-token:
    needs: [setup, login, share-with]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: contact-token
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/contact-token.json

  contact-wayf:
    needs: [setup, login, share-with, contact-token]
    if: always() && needs.setup.result == 'success'
    uses: ./.github/workflows/ci-run-wave.yml
    with:
      flow-id: contact-wayf
      suite-id: ${{ needs.setup.outputs['suite-id'] }}
      cells-path: .github/workflows/assets/contact-wayf.json

  aggregate:
    needs:
      [
        setup,
        login,
        share-with,
        contact-token,
        contact-wayf,
      ]
    if: always() && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Download all cell artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: 'cell-*'
          merge-multiple: true
      - name: Aggregate suite manifest
        run: |
          EXPECTED=$(nu scripts/ocmts.nu ci plan --cell-ids)
          nu scripts/ocmts.nu ci aggregate \
            --suite-id "${{ needs.setup.outputs['suite-id'] }}" \
            --output-dir artifacts/suites/aggregated \
            --expected-cells "$EXPECTED" \
            --archive \
            $(find artifacts -name 'suite-manifest.v1.json' -printf '%h ')
      - name: Upload aggregate outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregate-summary
          path: artifacts/suites/aggregated/
          if-no-files-found: warn

  site-publish:
    needs: [aggregate]
    if: github.ref == 'refs/heads/main' && needs.aggregate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '0.108.0'
      - name: Download aggregate bundle
        uses: actions/download-artifact@v4
        with:
          name: aggregate-summary
          path: artifacts/suites/aggregated/
      - name: Extract aggregate archive
        run: |
          tar -x -I zstd -f artifacts/suites/aggregated/suite-artifacts.tar.zst
      - name: Publish site
        env:
          OCMTS_SITE_REPO_SLUG: ${{ vars.OCMTS_SITE_REPO_SLUG || '' }}
          OCMTS_SITE_REF: ${{ vars.OCMTS_SITE_REF || 'main' }}
          OCMTS_SITE_REPO_URL: ${{ vars.OCMTS_SITE_REPO_URL || '' }}
        run: nu scripts/ocmts.nu site publish --artifacts-root artifacts --latest-suite
